<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — Udemy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <nav>
      <a href="index.html" class="logo">🎓 Udemy <small>v2</small></a>
      <div class="nav-links">
        <a href="index.html">Courses</a>
        <a href="signup.html" class="btn-nav-signup">Sign up</a>
      </div>
    </nav>
  </header>

  <section id="login-section">
    <h2>Sign in to your account</h2>
    <p>Or <a href="signup.html">create a new account</a></p>

    <div class="card login-card">
      <p><mark>Demo accounts:</mark></p>
      <ul>
        <li>Student: <span>student@demo.com</span></li>
        <li>Instructor: <span>instructor@demo.com</span></li>
      </ul>
      <p><small>Password can be anything for this demo.</small></p>

      <form id="login-form" action="#" method="get">
        <label for="email">Email address</label>
        <input type="text" id="email" name="email" placeholder="you@example.com">

        <label for="password">Password</label>
        <input type="text" id="password" name="password" placeholder="••••••••">

        <div class="radio-group">
          <input type="radio" id="role-student" name="role" value="student">
          <label for="role-student">Student</label>
          <input type="radio" id="role-instructor" name="role" value="instructor">
          <label for="role-instructor">Instructor</label>
        </div>

        <div class="form-buttons">
          <button type="submit" class="btn btn-primary">Sign in</button>
          <button type="reset" class="btn btn-secondary">Clear</button>
        </div>
      </form>

      <p id="login-msg"></p>
    </div>
  </section>

  <footer>
    <p>© 2026 Udemy v2 — <small>Proyecto escolar</small></p>
  </footer>

  <script src="login.js"></script>
</body>
</html>
